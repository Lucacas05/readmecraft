schema: spec-driven

context: |
  Tech stack: none detected yet (repository scaffold only)
  Architecture: empty Git repository with no source files or app modules
  Testing: no test runner or test files detected
  Style: no linter, formatter, type checker, or CI conventions detected

strict_tdd: false

